name: Scheduled Scrape
on:
  schedule:
    - cron: '*/15 * * * *'  # Run every 15 minutes to avoid rate limits
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Fetch all history for proper git operations

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Puppeteer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev gconf-service libasound2 libatk1.0-0 libc6 libcairo2 libcups2 libdbus-1-3 libexpat1 libfontconfig1 libgcc1 libgconf-2-4 libgdk-pixbuf2.0-0 libglib2.0-0 libgtk-3-0 libnspr4 libpango-1.0-0 libpangocairo-1.0-0 libstdc++6 libx11-6 libx11-xcb1 libxcb1 libxcomposite1 libxcursor1 libxdamage1 libxext6 libxfixes3 libxi6 libxrandr2 libxrender1 libxss1 libxtst6 ca-certificates fonts-liberation libappindicator1 libnss3 lsb-release xdg-utils wget

      - name: Inspect and fix script module syntax
        run: |
          echo "Checking script format..."
          head -n 5 scripts/scrapeHackathons.js
          
          # Check if file uses ES module syntax and convert to CommonJS if needed
          if grep -q "import.*from" scripts/scrapeHackathons.js; then
            echo "Converting ES module syntax to CommonJS..."
            # Replace import statements with require statements
            sed -i 's/import { launch } from "puppeteer";/const puppeteer = require("puppeteer");/g' scripts/scrapeHackathons.js
            sed -i 's/import { ensureDir, writeJson } from "fs-extra";/const fs = require("fs-extra");/g' scripts/scrapeHackathons.js
            sed -i 's/import { join } from "path";/const path = require("path");/g' scripts/scrapeHackathons.js
            
            # Check if more imports need conversion
            if grep -q "import" scripts/scrapeHackathons.js; then
              echo "Additional imports found, showing full script head:"
              head -n 20 scripts/scrapeHackathons.js
            fi
          else
            echo "Script appears to use CommonJS format, proceeding."
          fi
          
      - name: Run scrapers with error handling
        run: |
          # Run hackathons scraper
          node scripts/scrapeHackathons.js
          HACKATHONS_EXIT_CODE=$?
          
          # Run schemes scraper
          node scripts/scrapeSchemes.js
          SCHEMES_EXIT_CODE=$?
          
          # Print status
          echo "Hackathons scraper exit code: $HACKATHONS_EXIT_CODE"
          echo "Schemes scraper exit code: $SCHEMES_EXIT_CODE"
          
          # Continue even if one scraper fails
          exit 0
        
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          
          # Check if there are any changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update data from scheduled scrape"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
