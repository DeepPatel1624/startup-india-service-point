name: Scheduled Scrape

on:
  schedule:
    - cron: '0/6 * * * *'      # runs daily at 02:00 UTC
  workflow_dispatch:         # allows manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0      # fetch full history for git commits

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run hackathons scraper
        run: node scripts/scrapeHackathons.js

      - name: Run schemes scraper
        run: node scripts/scrapeSchemes.js

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          git commit -m "chore(data): automated scrape update [skip ci]" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
